<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PITERSNACKS - Premium Checkout</title>
    <style>
        :root { --primary: #f7941d; --dark: #1a1a1a; --aba: #005a8d; --success: #27ae60; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0; background: #f9f9f9; color: var(--dark); text-align: center; padding-bottom: 120px; overflow-x: hidden; }
        
        header { padding: 30px 20px; background: white; border-bottom: 1px solid #eee; position: relative; z-index: 10; }
        .logo-header { width: 150px; height: auto; margin-bottom: 10px; }
        .slogan-animasi { font-size: 0.9em; font-weight: 700; font-style: italic; color: var(--primary); animation: neonGlow 1.5s ease-in-out infinite alternate; }
        @keyframes neonGlow { from { opacity: 0.4; text-shadow: 0 0 2px #fff; } to { opacity: 1; text-shadow: 0 0 10px var(--primary), 0 0 15px #ffea00; transform: scale(1.02); } }

        /* INPUT NAMA */
        .input-section { padding: 15px; max-width: 800px; margin: 0 auto; }
        .input-nama { width: 90%; padding: 12px; border-radius: 10px; border: 2px solid #ddd; font-size: 1em; text-align: center; font-weight: bold; }
        .input-nama:focus { border-color: var(--primary); outline: none; }

        /* HUJAN MAKARONI */
        .falling-snack { position: fixed; top: -50px; z-index: 1; font-size: 20px; user-select: none; pointer-events: none; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 15px; max-width: 800px; margin: 0 auto; position: relative; z-index: 5; }
        .card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .card img { width: 100%; height: 130px; object-fit: cover; }
        .card-name { font-size: 0.7em; font-weight: 800; padding: 10px; text-transform: uppercase; }

        .counter { display: flex; justify-content: center; align-items: center; gap: 8px; padding-bottom: 10px; }
        .btn-qty { background: #f0f0f0; border: none; width: 28px; height: 28px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .qty-val { font-weight: 800; font-size: 1em; min-width: 20px; }

        #total-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--dark); color: white; padding: 15px 20px; display: none; justify-content: space-between; align-items: center; z-index: 1000; border-radius: 20px 20px 0 0; }
        .btn-order { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; }

        #payment-area { display:none; padding: 40px 20px; background: #fffbe6; margin-top: 30px; position: relative; z-index: 5; }
        .pay-options { display: flex; justify-content: center; gap: 10px; margin: 20px 0; }
        .pay-btn { padding: 12px 20px; border: 2px solid var(--aba); border-radius: 10px; background: white; font-weight: bold; cursor: pointer; }
        .pay-btn.active { background: var(--aba); color: white; }
        .qr-box { display: none; margin-top: 20px; }
        .qr-box img { width: 260px; border: 8px solid white; border-radius: 15px; }
        .final-btn { display: inline-block; background: var(--success); color: white; padding: 18px 40px; border: none; border-radius: 50px; font-weight: bold; margin-top: 30px; width: 85%; cursor: pointer; }

        @media (max-width: 600px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

    <header>
        <img src="https://i.postimg.cc/T3Dj51gC/download.png" class="logo-header" alt="Logo TERSNACKS">
        <div class="slogan-animasi">"Snack Asik, Teman Ngunyah di saat Ngetik"</div>
    </header>

    <div class="input-section">
        <input type="text" id="nama-pemesan" class="input-nama" placeholder="TULIS NAMA KAMU DISINI...">
    </div>

    <div class="grid" id="container-snack"></div>

    <div id="total-bar">
        <div style="text-align: left;">
            <div id="summary" style="font-size: 0.65em; opacity: 0.7;">Pilih snack...</div>
            <div id="display-total" style="font-weight: 900; color: var(--primary);">$0.00</div>
        </div>
        <button class="btn-order" onclick="openPayment()">ORDER SEKARANG</button>
    </div>

    <div id="payment-area">
        <h3>PILIH PEMBAYARAN ABA</h3>
        <div class="pay-options">
            <button class="pay-btn" onclick="showQR('usd', this)">USD ($)</button>
            <button class="pay-btn" onclick="showQR('riel', this)">RIEL (៛)</button>
        </div>
        <div id="qr-usd" class="qr-box"><img src="https://i.postimg.cc/nrqkP0h8/aba-riel.jpg"></div>
        <div id="qr-riel" class="qr-box"><img src="https://i.postimg.cc/vZZrrQfY/riel-aba-asli.jpg"></div>
        <button onclick="sendToSpreadsheet()" class="final-btn">KONFIRMASI PESANAN</button>
    </div>

    <audio id="bgMusic" loop><source src="lagu.mp3" type="audio/mpeg"></audio>

    <script>
        const snackData = [
            { id: 0, name: "KACANG TOJIN", img: "https://i.postimg.cc/MZbTnf6L/184f7bee-21ba-4477-81c6-c9f7acfb487a.jpg" },
            { id: 1, name: "KETAWA", img: "https://i.postimg.cc/ncFLBVMD/b95988fe-979d-48c6-891c-900e8f3e42f1.jpg" },
            { id: 2, name: "KACANG TING TING", img: "https://i.postimg.cc/hP2trF7k/ab4902a9-b072-4159-8ebb-3fbf45c8fc0b.jpg" },
            { id: 3, name: "MIE LIDI", img: "https://i.postimg.cc/K84vp9Pc/5bb5bc5e-cf70-47c1-86c5-dbd05e0cc616.jpg" },
            { id: 4, name: "MAKARONI", img: "https://i.postimg.cc/9f7XCrgJ/9c04e078-ee93-4550-8310-851e9a34d691.jpg" },
            { id: 5, name: "BASRENG", img: "https://i.postimg.cc/gjYGV4z5/601de701-a9b5-4bbf-8aa6-87b171349a64.jpg" },
            { id: 6, name: "LUMPIA", img: "https://i.postimg.cc/ZYcbbkj9/38611567-5f9f-4899-9d33-cffa77b5e469.jpg" },
            { id: 7, name: "KACANG ARAB", img: "https://i.postimg.cc/sDgV1n09/16ad7cba-62a3-48d4-a52c-25fe2f379b5e.jpg" },
            { id: 8, name: "KACANG MADU", img: "https://i.postimg.cc/sDH3Wpk1/129f1f36-b98b-4f99-bdde-93c543eb32e8.jpg" }
        ];

        let cart = {};

        function createRain() {
            const icons = ['🥨', '🍟', '😋'];
            const snack = document.createElement('div');
            snack.classList.add('falling-snack');
            snack.innerText = icons[Math.floor(Math.random() * icons.length)];
            snack.style.left = Math.random() * 100 + "vw";
            snack.style.animationDuration = Math.random() * 3 + 2 + "s";
            document.body.appendChild(snack);
            setTimeout(() => snack.remove(), 5000);
        }
        setInterval(createRain, 400);

        function init() {
            const grid = document.getElementById('container-snack');
            snackData.forEach(s => {
                grid.innerHTML += `
                    <div class="card">
                        <img src="${s.img}">
                        <div class="card-name">${s.name}</div>
                        <div class="counter">
                            <button class="btn-qty" onclick="changeQty(${s.id}, -1)">-</button>
                            <span class="qty-val" id="qty-${s.id}">0</span>
                            <button class="btn-qty" onclick="changeQty(${s.id}, 1)">+</button>
                        </div>
                    </div>`;
            });
        }

        function changeQty(id, delta) {
            cart[id] = (cart[id] || 0) + delta;
            if(cart[id] < 0) cart[id] = 0;
            document.getElementById(`qty-${id}`).innerText = cart[id];
            updateTotal();
        }

        function updateTotal() {
            let total = 0; let list = [];
            Object.keys(cart).forEach(id => {
                if(cart[id] > 0) { total += cart[id] * 2.5; list.push(`${cart[id]}x ${snackData[id].name}`); }
            });
            const bar = document.getElementById('total-bar');
            if(total > 0) {
                bar.style.display = 'flex';
                document.getElementById('display-total').innerText = `$${total.toFixed(2)}`;
                document.getElementById('summary').innerText = list.join(", ");
            } else { bar.style.display = 'none'; }
        }

        function openPayment() {
            const nama = document.getElementById('nama-pemesan').value;
            if(!nama) return alert("Isi NAMA kamu dulu ya Bos!");
            document.getElementById('bgMusic').play();
            document.getElementById('payment-area').style.display = 'block';
            document.getElementById('payment-area').scrollIntoView({ behavior: 'smooth' });
        }

        function showQR(type, btn) {
            document.getElementById('qr-usd').style.display = type === 'usd' ? 'block' : 'none';
            document.getElementById('qr-riel').style.display = type === 'riel' ? 'block' : 'none';
            document.querySelectorAll('.pay-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function sendToSpreadsheet() {
            const nama = document.getElementById('nama-pemesan').value;
            let list = []; let totalUSD = 0;
            Object.keys(cart).forEach(id => {
                if(cart[id] > 0) { totalUSD += cart[id] * 2.5; list.push(`${cart[id]}x ${snackData[id].name}`); }
            });

            const detailOrder = list.join(", ");
            const totalFinal = "$" + totalUSD.toFixed(2);
            const scriptURL = "https://script.google.com/macros/s/AKfycbwwTRYTujUrRX5EzBC9b-cIPeFd8TWkKJa-1Brtk1FPRipGG9XsuNHzM2PjfdeFtvHz/exec";
            const finalPath = `${scriptURL}?nama=${encodeURIComponent(nama)}&pesanan=${encodeURIComponent(detailOrder)}&total=${encodeURIComponent(totalFinal)}`;

            fetch(finalPath, { method: 'POST', mode: 'no-cors' })
            .then(() => {
                alert("MANTAP Bos " + nama + "! Pesanan masuk ke Spreadsheet.");
                location.reload();
            }).catch(() => alert("Klik konfirmasi lagi Bos!"));
        }
        init();
    </script>
</body>
</html>
