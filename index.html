<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERSNACKS.ID - PREMIUM QUALITY</title>
    <style>
        :root { 
            --primary: #00d4ff; 
            --glass: rgba(10, 25, 41, 0.9); 
            --success: #00f2ff; 
            --danger: #ff0000;
        }

        /* CUSTOM CURSOR AAA */
        body { 
            cursor: none; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; background: #000; color: white; 
            text-align: center; padding-bottom: 50px; overflow-x: hidden; 
        }
        #cursor-dot {
            width: 8px; height: 8px; background: #fff;
            position: fixed; border-radius: 50%; z-index: 9999;
            pointer-events: none; transition: transform 0.1s;
        }
        #cursor-outline {
            width: 40px; height: 40px; border: 2px solid var(--primary);
            position: fixed; border-radius: 50%; z-index: 9998;
            pointer-events: none; transition: 0.15s ease-out;
            box-shadow: 0 0 15px var(--primary);
        }

        /* CANVAS HUJAN AAA */
        #rainCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

        header { 
            position: relative; z-index: 10; padding: 45px 10px; 
            background: var(--glass); border-bottom: 2px solid var(--primary); 
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
        }
        
        .logo-header { width: 280px; filter: drop-shadow(0 0 10px var(--primary)); }

        /* TEKS PREMIUM SHIMMER */
        .premium-text {
            font-size: 0.85em; font-weight: 900; letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.3);
            background: linear-gradient(90deg, transparent, #fff, transparent);
            background-size: 200% 100%;
            -webkit-background-clip: text; background-clip: text;
            animation: shine 3s linear infinite;
            margin: 5px 0 0 0;
        }
        @keyframes shine { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

        .grid { 
            display: grid; grid-template-columns: repeat(4, 1fr); 
            gap: 15px; padding: 20px; max-width: 1200px; 
            margin: 0 auto; position: relative; z-index: 10; 
        }
        
        .card { 
            background: var(--glass); border-radius: 15px; overflow: hidden; 
            border: 1px solid rgba(0, 212, 255, 0.2); position: relative; 
            transition: 0.3s;
        }
        .card:hover { border-color: var(--primary); transform: scale(1.02); }
        .card img { width: 100%; height: 150px; object-fit: cover; }
        
        .sold-out-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 150px; 
            background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 5;
        }
        .is-empty .sold-out-overlay { display: flex; }
        .so-text { color: white; background: var(--danger); padding: 5px 15px; font-weight: 900; transform: rotate(-15deg); border: 2px solid white; }

        /* FOOTER & ANIMASI KENTANG */
        footer { 
            position: relative; z-index: 10; margin-top: 60px; 
            padding: 50px 20px; border-top: 1px solid rgba(0, 212, 255, 0.2); 
            background: rgba(10, 25, 41, 0.6); 
        }
        .thank-you-container {
            display: flex; align-items: center; justify-content: center; gap: 15px;
            margin-bottom: 10px;
        }
        .kentang-gif { width: 50px; height: 50px; border-radius: 10px; }

        /* CHAT & TOTAL BAR */
        #total-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--glass); padding: 20px 40px; display: none; justify-content: space-between; align-items: center; border-top: 2px solid var(--primary); z-index: 1000; backdrop-filter: blur(10px); }
        .btn-order { background: var(--primary); color: black; border: none; padding: 12px 25px; border-radius: 10px; font-weight: 900; cursor: pointer; }

        #chat-widget { position: fixed; bottom: 30px; right: 30px; z-index: 2000; display: flex; flex-direction: column; align-items: flex-end; }
        #chat-box { width: 300px; background: var(--glass); border: 2px solid var(--primary); border-radius: 15px; margin-bottom: 10px; display: none; padding: 15px; text-align: left; backdrop-filter: blur(10px); }
        .btn-toggle-chat { background: var(--primary); width: 60px; height: 60px; border-radius: 50%; border: none; box-shadow: 0 0 20px var(--primary); font-size: 1.5rem; cursor: pointer; }

        #payment-area { position: relative; z-index: 10; display:none; padding: 40px 20px; background: rgba(0,0,0,0.95); border-top: 2px solid var(--primary); }
        .input-nama { width: 85%; padding: 15px; border-radius: 12px; border: 1px solid var(--primary); background: transparent; color: white; margin-bottom: 25px; text-align: center; font-weight: 800; }

        @media (max-width: 768px) { .grid { grid-template-columns: repeat(2, 1fr); } body { cursor: auto; } #cursor-dot, #cursor-outline { display: none; } }
    </style>
</head>
<body>

<div id="cursor-dot"></div>
<div id="cursor-outline"></div>

<canvas id="rainCanvas"></canvas>

<header>
    <img src="https://i.postimg.cc/T3Dj51gC/download.png" class="logo-header">
    <h2 style="margin:0; letter-spacing: 5px; font-weight: 900; font-size: 1.6em;">TERSNACKS.ID</h2>
    <p class="premium-text">PREMIUM QUALITY • $3.00</p>
</header>

<div id="loading" style="padding: 50px; color: var(--primary); font-weight: 800;">SYNCING STOCK...</div>
<div class="grid" id="container-snack"></div>

<div id="total-bar">
    <div style="text-align:left">
        <div id="summary" style="font-size: 0.7em; color: #aaa;"></div>
        <div id="display-total" style="font-weight: 900; color: var(--primary); font-size: 1.6em;">$0.00</div>
    </div>
    <button class="btn-order" onclick="openPayment()">ORDER SEKARANG</button>
</div>

<div id="payment-area">
    <h3 style="color: var(--primary); font-weight: 900;">DATA PEMBELI</h3>
    <input type="text" id="nama-pembeli" class="input-nama" placeholder="SIAPA NAMA ANDA?">
    <button id="submit-btn" onclick="sendToSpreadsheet()" class="btn-order" style="width: 90%; padding: 18px; border-radius: 50px;">KONFIRMASI & KIRIM</button>
</div>

<div id="chat-widget">
    <div id="chat-box">
        <h4 style="margin:0 0 10px 0; color:var(--primary)">TEAMS LIVE SUPPORT</h4>
        <input type="text" id="chat-name" placeholder="Nama lo..." style="width:100%; margin-bottom:10px; background:transparent; border:1px solid #333; color:white; padding:8px; border-radius:5px;">
        <textarea id="chat-msg" rows="3" placeholder="Pesan untuk Tim..." style="width:100%; background:transparent; border:1px solid #333; color:white; padding:8px; border-radius:5px;"></textarea>
        <button onclick="sendToTeams()" style="width:100%; margin-top:10px; background:var(--primary); border:none; padding:10px; font-weight:900; border-radius:5px; cursor:pointer;">KIRIM</button>
    </div>
    <button class="btn-toggle-chat" onclick="toggleChat()">💬</button>
</div>

<footer>
    <div class="thank-you-container">
        <h3 style="color: var(--primary); letter-spacing: 2px; margin: 0; font-weight: 900; font-size: 1.1em;">THANK YOU FOR SHOPPING!</h3>
        <img src="https://i.postimg.cc/tg7Ft01L/potate-lil-potate.gif" class="kentang-gif" alt="Kentang Kehujanan">
    </div>
    <div style="color: #fff; font-size: 0.9em; font-weight: 700; opacity: 0.8;">TERIMA KASIH SUDAH BERBELANJA DI TERSNACKS.ID</div>
    <div style="margin-top: 25px; opacity: 0.3; font-size: 0.6em; letter-spacing: 5px; font-weight: 900;">TERSNACKS.ID • 2026</div>
</footer>

<script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbykBwYZX2poPZx2-7gxtfnlrg0N5BW29lkdYOKeaelaGapyKi3NHQHUYDMoA1XTGTjO/exec";

    // 1. CURSOR ENGINE
    const dot = document.getElementById('cursor-dot');
    const outline = document.getElementById('cursor-outline');
    window.addEventListener('mousemove', (e) => {
        dot.style.left = e.clientX + 'px'; dot.style.top = e.clientY + 'px';
        setTimeout(() => {
            outline.style.left = e.clientX - 16 + 'px'; outline.style.top = e.clientY - 16 + 'px';
        }, 50);
    });

    // 2. RAIN ENGINE
    const canvas = document.getElementById('rainCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    let drops = [];
    for(let i=0; i<120; i++) drops.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, len:Math.random()*25+10, speed:Math.random()*12+6});
    function drawRain() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.strokeStyle = 'rgba(0, 212, 255, 0.4)'; ctx.lineWidth = 1.5;
        drops.forEach(d => {
            ctx.beginPath(); ctx.moveTo(d.x, d.y); ctx.lineTo(d.x, d.y+d.len); ctx.stroke();
            d.y+=d.speed; if(d.y>canvas.height){ d.y=-30; d.x=Math.random()*canvas.width; }
        });
        requestAnimationFrame(drawRain);
    }
    drawRain();

    // 3. SNACK LOGIC
    let snackData = [
        { id: 0, name: "KACANG TOJIN", stock: 0, img: "https://i.postimg.cc/MZbTnf6L/184f7bee-21ba-4477-81c6-c9f7acfb487a.jpg" },
        { id: 1, name: "KETAWA", stock: 0, img: "https://i.postimg.cc/ncFLBVMD/b95988fe-979d-48c6-891c-900e8f3e42f1.jpg" },
        { id: 2, name: "KACANG TING TING", stock: 0, img: "https://i.postimg.cc/hP2trF7k/ab4902a9-b072-4159-8ebb-3fbf45c8fc0b.jpg" },
        { id: 3, name: "MIE LIDI", stock: 0, img: "https://i.postimg.cc/WbJ7sj5j/image.png" },
        { id: 4, name: "MAKARONI", stock: 0, img: "https://i.postimg.cc/9f7XCrgJ/9c04e078-ee93-4550-8310-851e9a34d691.jpg" },
        { id: 5, name: "BASRENG", stock: 0, img: "https://i.postimg.cc/gjYGV4z5/601de701-a9b5-4bbf-8aa6-87b171349a64.jpg" },
        { id: 6, name: "LUMPIA", stock: 0, img: "https://i.postimg.cc/ZYcbbkj9/38611567-5f9f-4899-9d33-cffa77b5e469.jpg" },
        { id: 7, name: "KACANG ARAB", stock: 0, img: "https://i.postimg.cc/sDgV1n09/16ad7cba-62a3-48d4-a52c-25fe2f379b5e.jpg" },
        { id: 8, name: "KACANG TELUR", stock: 0, img: "https://i.postimg.cc/nLXR3qKF/a380402e-538b-431d-bc8e-5b332b2fbe5f.jpg" }
    ];
    let cart = {};

    function init() {
        const s = document.createElement('script');
        s.src = `${scriptURL}?callback=handleData`;
        document.body.appendChild(s);
    }

    function handleData(d) {
        snackData.forEach(s => { if(d[s.name.toUpperCase()]) s.stock = parseInt(d[s.name.toUpperCase()]); });
        document.getElementById('loading').style.display = 'none';
        render();
    }

    function render() {
        const grid = document.getElementById('container-snack'); grid.innerHTML = '';
        snackData.forEach(s => {
            const empty = s.stock <= 0;
            grid.innerHTML += `
                <div class="card ${empty ? 'is-empty' : ''}">
                    <div class="sold-out-overlay"><div class="so-text">SOLD OUT</div></div>
                    <img src="${s.img}">
                    <div style="padding:15px">
                        <div style="font-weight:800; color:var(--primary); font-size:0.8em; height:35px">${s.name}</div>
                        <div style="font-size:0.65em; color:var(--primary); margin-bottom:10px">SISA: ${s.stock}</div>
                        <div style="display:flex; justify-content:center; align-items:center; gap:10px">
                            <button onclick="changeQty(${s.id},-1)" style="background:#333; color:white; border:1px solid var(--primary); border-radius:5px; width:30px; cursor:pointer">-</button>
                            <span id="qty-${s.id}">0</span>
                            <button onclick="changeQty(${s.id},1)" style="background:#333; color:white; border:1px solid var(--primary); border-radius:5px; width:30px; cursor:pointer">+</button>
                        </div>
                    </div>
                </div>`;
        });
    }

    function changeQty(id, delta) {
        let q = (cart[id] || 0) + delta;
        if(q < 0 || q > snackData[id].stock) return;
        cart[id] = q; document.getElementById(`qty-${id}`).innerText = q;
        updateTotal();
    }

    function updateTotal() {
        let total = 0; let list = [];
        Object.keys(cart).forEach(id => { if(cart[id]>0){ total+=cart[id]*3; list.push(`${cart[id]}x ${snackData[id].name}`); } });
        document.getElementById('total-bar').style.display = total > 0 ? 'flex' : 'none';
        document.getElementById('display-total').innerText = "$" + total.toFixed(2);
        document.getElementById('summary').innerText = list.join(", ");
    }

    function openPayment() { document.getElementById('payment-area').style.display='block'; window.scrollTo({top: document.body.scrollHeight, behavior: 'smooth'}); }

    function sendToSpreadsheet() {
        const n = document.getElementById('nama-pembeli').value;
        if(!n) return alert("NAMA HARUS DIISI!");
        alert("Order Sent to Spreadsheet!"); location.reload();
    }

    function toggleChat() { const b = document.getElementById('chat-box'); b.style.display = b.style.display === 'block' ? 'none' : 'block'; }
    
    function sendToTeams() {
        const n = document.getElementById('chat-name').value;
        const m = document.getElementById('chat-msg').value;
        if(!n || !m) return alert("Isi data dulu!");
        fetch(`${scriptURL}?type=chat&nama=${encodeURIComponent(n)}&pesanan=${encodeURIComponent(m)}`, {mode:'no-cors'})
        .then(() => { alert("Terkirim ke Teams!"); toggleChat(); });
    }

    init();
</script>
</body>
</html>
