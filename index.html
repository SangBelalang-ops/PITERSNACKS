<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PITERSNACKS PREMIUM</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; margin: 0; padding: 20px; }
        h1 { color: #f7941d; }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); /* INI BIAR BERJEJER 3 KIRI-KANAN */
            gap: 15px; 
            max-width: 900px; 
            margin: 20px auto; 
        }
        .card { background: white; padding: 10px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .card img { width: 100%; border-radius: 8px; height: 150px; object-fit: cover; }
        .price { color: red; font-weight: bold; display: block; margin: 5px 0; }
        .btn { 
            display: block; 
            background: #27ae60; 
            color: white; 
            padding: 15px; 
            text-decoration: none; 
            border-radius: 10px; 
            font-weight: bold; 
            margin-top: 20px;
        }
        @media (max-width: 600px) { .grid { grid-template-columns: repeat(2, 1fr); } } /* Di HP jadi 2 kolom */
    </style>
</head>
<body>

    <h1>PITERSNACKS CAMBODIA</h1>
    <p>Premium Snacks - Flat Price $2.5 (10,000 Riel)</p>

    <div class="grid">
        <div class="card"><img src="snack1.jpg"><span class="price">$2.5</span></div>
        <div class="card"><img src="snack2.jpg"><span class="price">$2.5</span></div>
        <div class="card"><img src="snack3.jpg"><span class="price">$2.5</span></div>
        <div class="card"><img src="snack4.jpg"><span class="price">$2.5</span></div>
        <div class="card"><img src="snack5.jpg"><span class="price">$2.5</span></div>
        <div class="card"><img src="snack6.jpg"><span class="price">$2.5</span></div>
        <div class="card"><img src="snack7.jpg"><span class="price">$2.5</span></div>
        <div class="card"><img src="snack8.jpg"><span class="price">$2.5</span></div>
        <div class="card"><img src="snack9.jpg"><span class="price">$2.5</span></div>
    </div>

    <a href="https://docs.google.com/forms/d/e/1FAIpQLSfpGZ_sQQGpM5BlTaBT4eUBtDmTTVw4kMBCRnUGp3PjlM_vdw/viewform" class="btn">KLIK DI SINI UNTUK ORDER</a>

</body>
</html>
