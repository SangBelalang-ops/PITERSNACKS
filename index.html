<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERSNACKS.ID - SONGKRAN SPECIAL</title>
    <style>
        :root { --cyan: #00ffff; --red: #ff4d4d; --dark: #050505; --glass: rgba(15, 15, 15, 0.9); }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--dark); color: white; text-align: center; padding-bottom: 80px; overflow-x: hidden; }

        /* SONGKRAN WATER SPLASH EFFECT */
        .splash { position: fixed; pointer-events: none; z-index: 999; border-radius: 50%; background: var(--cyan); opacity: 0.7; animation: splashAnim 0.8s ease-out forwards; }
        @keyframes splashAnim { 0% { transform: scale(0); opacity: 1; } 100% { transform: scale(4); opacity: 0; } }

        header { padding: 40px 20px; background: linear-gradient(180deg, rgba(0,255,255,0.15) 0%, transparent 100%); border-bottom: 2px solid var(--cyan); }
        .logo-header { width: 220px; filter: drop-shadow(0 0 15px var(--cyan)); margin-bottom: 10px; }
        .glitch { font-size: 2.2em; font-weight: 900; color: var(--cyan); text-shadow: 3px 3px var(--red); letter-spacing: 3px; margin: 0; }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 20px; max-width: 800px; margin: 0 auto; }
        .card { background: var(--glass); border-radius: 20px; overflow: hidden; border: 1px solid rgba(0,255,255,0.2); position: relative; transition: 0.3s; }
        .card:hover { border-color: var(--cyan); box-shadow: 0 0 20px rgba(0,255,255,0.3); transform: translateY(-5px); }
        .card img { width: 100%; height: 140px; object-fit: cover; }
        
        .badge { position: absolute; top: 10px; left: 10px; background: var(--red); color: white; padding: 4px 10px; font-size: 0.6em; font-weight: 900; border-radius: 5px; box-shadow: 0 0 10px var(--red); }
        .card-name { font-size: 0.8em; font-weight: 800; color: var(--cyan); padding: 10px 5px; text-transform: uppercase; }
        .stock-tag { font-size: 0.65em; background: rgba(0,255,255,0.1); color: #fff; padding: 3px 10px; border-radius: 50px; border: 1px solid var(--cyan); display: inline-block; margin-bottom: 10px; }

        .counter { display: flex; justify-content: center; align-items: center; gap: 12px; padding-bottom: 15px; }
        .btn-qty { background: transparent; border: 2px solid var(--cyan); width: 32px; height: 32px; border-radius: 50%; color: var(--cyan); font-weight: 900; cursor: pointer; }
        .btn-qty:active { background: var(--cyan); color: black; }
        .btn-qty:disabled { opacity: 0.2; border-color: #555; }

        #total-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: var(--cyan); color: black; padding: 15px 25px; border-radius: 50px; display: none; justify-content: space-between; align-items: center; z-index: 1000; box-shadow: 0 0 25px rgba(0,255,255,0.5); }
        
        #payment-area { display: none; padding: 40px 20px; background: #000; border-top: 2px solid var(--cyan); }
        .input-nama { width: 85%; padding: 15px; border-radius: 12px; border: 2px solid var(--cyan); background: transparent; color: white; text-align: center; font-weight: 800; font-size: 1em; margin-bottom: 20px; }
        .final-btn { background: var(--cyan); color: black; padding: 18px; border: none; border-radius: 50px; font-weight: 900; width: 90%; cursor: pointer; font-size: 1.1em; }

        .sold-out { filter: grayscale(1); opacity: 0.5; }
        .sold-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-15deg); background: var(--red); color: white; padding: 5px 15px; font-weight: 900; border: 2px solid white; z-index: 10; font-size: 0.8em; }
    </style>
</head>
<body onclick="spawnSplash(event)">

<header>
    <img src="https://i.postimg.cc/T3Dj51gC/download.png" class="logo-header">
    <h1 class="glitch">SONGKRAN</h1>
    <p style="color: var(--cyan); font-weight: 700; letter-spacing: 2px;">SPECIAL PROMO • $3.00</p>
</header>

<div id="loading" style="padding: 50px; color: var(--cyan); font-weight: 800;">SEDANG MENGISI AIR...</div>
<div class="grid" id="container-snack"></div>

<div id="total-bar">
    <div id="display-total" style="font-weight: 900; font-size: 1.4em;">$0.00</div>
    <button onclick="openPayment()" style="background:black; color:white; border:none; padding:10px 20px; border-radius:30px; font-weight:900; cursor:pointer;">ORDER NOW</button>
</div>

<div id="payment-area">
    <h2 style="color: var(--cyan); font-weight: 900;">SIAP BASAH-BASAHAN?</h2>
    <input type="text" id="nama-pembeli" class="input-nama" placeholder="NAMA BOSKU?">
    <div style="margin-bottom: 25px;">
        <img src="https://i.postimg.cc/nrqkP0h8/aba-riel.jpg" style="width: 220px; border: 4px solid var(--cyan); border-radius: 15px;">
    </div>
    <button id="submit-btn" onclick="sendToSpreadsheet()" class="final-btn">KONFIRMASI PESANAN</button>
</div>

<script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbxZiA-xrXnsAnx4GIUolADVJfKR0HG6cSnZ-Jy1hGi5pKKTxdpp2hvvjirx4MIECyOX/exec";

    function spawnSplash(e) {
        const s = document.createElement('div');
        s.className = 'splash';
        s.style.left = e.clientX + 'px';
        s.style.top = e.clientY + 'px';
        document.body.appendChild(s);
        setTimeout(() => s.remove(), 800);
    }

    let snackData = [
        { id: 0, name: "KACANG TOJIN", stock: 0, img: "https://i.postimg.cc/MZbTnf6L/184f7bee-21ba-4477-81c6-c9f7acfb487a.jpg" },
        { id: 1, name: "KETAWA", stock: 0, img: "https://i.postimg.cc/ncFLBVMD/b95988fe-979d-48c6-891c-900e8f3e42f1.jpg" },
        { id: 2, name: "KACANG TING TING", stock: 0, img: "https://i.postimg.cc/hP2trF7k/ab4902a9-b072-4159-8ebb-3fbf45c8fc0b.jpg" },
        { id: 3, name: "MIE LIDI", stock: 0, img: "https://i.postimg.cc/WbJ7sj5j/image.png" },
        { id: 4, name: "MAKARONI", stock: 0, img: "https://i.postimg.cc/9f7XCrgJ/9c04e078-ee93-4550-8310-851e9a34d691.jpg" },
        { id: 5, name: "BASRENG", stock: 0, img: "https://i.postimg.cc/gjYGV4z5/601de701-a9b5-4bbf-8aa6-87b171349a64.jpg" },
        { id: 6, name: "LUMPIA", stock: 0, img: "https://i.postimg.cc/ZYcbbkj9/38611567-5f9f-4899-9d33-cffa77b5e469.jpg" },
        { id: 7, name: "KACANG ARAB", stock: 0, img: "https://i.postimg.cc/sDgV1n09/16ad7cba-62a3-48d4-a52c-25fe2f379b5e.jpg" },
        { id: 8, name: "KACANG MADU", stock: 0, img: "https://i.postimg.cc/sDH3Wpk1/129f1f36-b98b-4f99-bdde-93c543eb32e8.jpg" },
        { id: 9, name: "COMING SOON", stock: 0, img: "https://i.postimg.cc/x1yD1PBH/e5f0873b-c76b-4312-88bc-3bd67981a550.gif" }
    ];

    let cart = {};

    async function init() {
        try {
            const res = await fetch(scriptURL);
            const sheetStok = await res.json();
            snackData.forEach(s => { if(sheetStok[s.name] !== undefined) s.stock = sheetStok[s.name]; });
            document.getElementById('loading').style.display = 'none';
            render();
        } catch(e) { setTimeout(init, 3000); }
    }

    function render() {
        const grid = document.getElementById('container-snack');
        grid.innerHTML = '';
        snackData.forEach(s => {
            const isEmpty = s.stock <= 0;
            const isComing = s.name === "COMING SOON";
            grid.innerHTML += `
                <div class="card ${isEmpty ? 'sold-out' : ''}">
                    ${isEmpty ? '<div class="sold-text">HABIS!</div>' : ''}
                    ${isComing ? '<div class="badge">HOT ITEM</div>' : ''}
                    <img src="${s.img}">
                    <div class="card-name">${s.name}</div>
                    <div class="stock-tag">${isComing ? 'TERBATAS' : 'SISA: ' + s.stock}</div>
                    <div class="counter">
                        <button class="btn-qty" onclick="changeQty(${s.id},-1)" ${isEmpty?'disabled':''}>-</button>
                        <span id="qty-${s.id}" style="font-weight:900; width:20px;">0</span>
                        <button class="btn-qty" onclick="changeQty(${s.id},1)" ${isEmpty?'disabled':''}>+</button>
                    </div>
                </div>`;
        });
    }

    function changeQty(id, delta) {
        let q = cart[id] || 0;
        if(delta > 0 && q >= snackData[id].stock) return;
        q += delta; if(q < 0) q = 0;
        cart[id] = q;
        document.getElementById(`qty-${id}`).innerText = q;
        updateTotal();
    }

    function updateTotal() {
        let total = 0;
        Object.keys(cart).forEach(id => { if(cart[id]>0) total += cart[id]*3; });
        document.getElementById('total-bar').style.display = total > 0 ? 'flex' : 'none';
        document.getElementById('display-total').innerText = `$${total.toFixed(2)}`;
    }

    function openPayment() { 
        document.getElementById('payment-area').style.display='block'; 
        window.scrollTo({top: document.body.scrollHeight, behavior: 'smooth'}); 
    }

    function sendToSpreadsheet() {
        const nama = document.getElementById('nama-pembeli').value;
        if(!nama) return alert("Siapa Nama Bosku?");
        
        let list = []; let total = 0;
        Object.keys(cart).forEach(id => { 
            if(cart[id]>0){ total += cart[id]*3; list.push(`${cart[id]}x ${snackData[id].name}`); }
        });

        const btn = document.getElementById('submit-btn');
        btn.innerText = "SEDANG MENGIRIM..."; btn.disabled = true;

        const params = new URLSearchParams();
        params.append('pesanan', `Pembeli: ${nama} | Order: ${list.join(", ")}`);
        params.append('total', "$" + total.toFixed(2));

        fetch(`${scriptURL}?${params.toString()}`, { method: 'POST', mode: 'no-cors' })
        .then(() => { 
            alert("MANTAP! Pesanan Berhasil Dicatat."); 
            const waMsg = `Halo Admin! Saya ${nama} mau konfirmasi order TERSNACKS:\n${list.join("\n")}\nTotal: $${total.toFixed(2)}`;
            window.location.href = `https://wa.me/6281234567890?text=${encodeURIComponent(waMsg)}`; // GANTI NO WA LU DISINI
        });
    }

    init();
</script>
</body>
</html>
