<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERSNACKS.ID - ULTRA DARK MODE</title>
    <style>
        /* Palette Warna Ultra Dark */
        :root { 
            --primary: #f7941d; 
            --bg-body: #0a0a0a; 
            --bg-card: #161616; 
            --bg-header: #000000;
            --text-main: #e0e0e0; 
            --aba: #00a8ff; 
            --success: #2ecc71; 
            --border: #252525;
        }
        
        body { 
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif; 
            margin: 0; padding: 0; 
            background: var(--bg-body) !important; 
            color: var(--text-main) !important; 
            text-align: center; 
            padding-bottom: 120px; 
            overflow-x: hidden; 
        }

        /* Header Solid Black */
        header { 
            height: 85px !important; 
            background: var(--bg-header) !important; 
            border-bottom: 1px solid var(--border); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            position: sticky; 
            top: 0; 
            z-index: 100; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.9);
        }
        .logo-header { height: 55px !important; width: auto !important; }

        /* Welcome Text */
        .welcome-msg {
            padding: 25px 10px 5px;
            font-weight: 900;
            font-size: 1.2em;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(247, 148, 29, 0.3);
        }

        /* Grid System */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 15px; 
            padding: 20px; 
            max-width: 900px; 
            margin: 0 auto; 
        }

        /* Card Styling */
        .card { 
            background: var(--bg-card) !important; 
            border-radius: 18px; 
            overflow: hidden; 
            border: 1px solid var(--border); 
            transition: all 0.3s ease;
        }
        .card:hover { border-color: var(--primary); transform: translateY(-5px); }

        .card img { 
            width: 100%; 
            height: 150px; 
            object-fit: cover; 
            filter: brightness(0.8); 
            transition: 0.3s;
        }
        .card:hover img { filter: brightness(1); }
        
        .card-info { padding: 15px; }
        .card-name { 
            font-size: 0.85em; 
            font-weight: 700; 
            margin-bottom: 12px; 
            height: 35px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: #fff;
        }

        /* Qty Controls */
        .counter { display: flex; justify-content: center; align-items: center; gap: 15px; }
        .btn-qty { 
            background: #252525; 
            border: 1px solid #333; 
            width: 35px; 
            height: 35px; 
            border-radius: 10px; 
            cursor: pointer; 
            color: white; 
            font-size: 1.2em;
            transition: 0.2s;
        }
        .btn-qty:hover { background: var(--primary); border-color: var(--primary); }
        .qty-val { font-weight: 800; font-size: 1.2em; min-width: 25px; color: var(--primary); }

        /* Floating Order Bar */
        #total-bar { 
            position: fixed; bottom: 15px; left: 15px; right: 15px; 
            background: rgba(22, 22, 22, 0.95); 
            backdrop-filter: blur(10px);
            padding: 15px 25px; 
            display: none; 
            justify-content: space-between; 
            align-items: center; 
            z-index: 1000; 
            border: 1px solid var(--primary);
            border-radius: 20px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        .total-price { font-weight: 900; font-size: 1.4em; color: var(--primary); }
        .btn-order { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 12px 24px; 
            border-radius: 12px; 
            font-weight: 900; 
            cursor: pointer;
            text-transform: uppercase;
        }

        /* Payment Area */
        #payment-area { 
            display:none; 
            padding: 40px 20px; 
            background: #0f0f0f !important; 
            border-top: 1px solid var(--border); 
            margin-top: 40px; 
        }
        .input-nama { 
            width: 85%; padding: 18px; 
            border-radius: 15px; 
            border: 1px solid var(--border); 
            background: #1a1a1a; 
            color: white; 
            margin-bottom: 30px; 
            font-size: 1.1em; 
            text-align: center;
        }
        .input-nama:focus { border-color: var(--primary); outline: none; }
        
        .pay-btn { 
            padding: 15px; border: 1px solid var(--aba); border-radius: 12px; 
            background: transparent; color: var(--aba); font-weight: 800; cursor: pointer; flex: 1; 
        }
        .pay-btn.active { background: var(--aba); color: white; }
        
        .qr-box img { width: 280px; border: 5px solid #222; border-radius: 20px; margin-top: 15px; }
        .final-btn { background: var(--success); color: white; padding: 20px; border: none; border-radius: 50px; font-weight: 900; margin-top: 40px; width: 90%; cursor: pointer; font-size: 1.1em; box-shadow: 0 10px 20px rgba(46, 204, 113, 0.2); }

        @media (max-width: 600px) { .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; } }
    </style>
</head>
<body>

    <header>
        <div style="display: flex; align-items: center; gap: 15px;">
            <img src="https://i.postimg.cc/T3Dj51gC/download.png" class="logo-header" alt="Logo">
            <div style="text-align: left;">
                <h2 style="margin:0; font-size: 1.3em; color: #fff; letter-spacing: 1px;">TERSNACKS</h2>
                <p style="margin:0; font-size:0.65em; color:var(--primary); font-weight:bold; letter-spacing: 2px;">DARK MODE PREMIUM</p>
            </div>
        </div>
    </header>

    <div class="welcome-msg">SELAMAT DATANG SNACKERS</div>

    <div class="grid" id="container-snack"></div>

    <div id="total-bar">
        <div style="text-align:left;">
            <div id="summary" style="font-size: 0.7em; color: #888; margin-bottom: 2px;">Siap dicheckout...</div>
            <div class="total-price" id="display-total">$0.00</div>
        </div>
        <button class="btn-order" onclick="openPayment()">ORDER SEKARANG</button>
    </div>

    <div id="payment-area">
        <h3 style="color: var(--primary);">NAMA PEMESAN</h3>
        <input type="text" id="nama-pembeli" class="input-nama" placeholder="Siapa nama anda?" required>
        
        <h3 style="color: var(--primary);">PEMBAYARAN ABA</h3>
        <div class="pay-options" style="display:flex; gap:10px; max-width:400px; margin: 0 auto 20px;">
            <button class="pay-btn" onclick="showQR('usd', this)">USD ($)</button>
            <button class="pay-btn" onclick="showQR('riel', this)">RIEL (៛)</button>
        </div>

        <div id="qr-usd" class="qr-box" style="display:none;">
            <img src="https://i.postimg.cc/nrqkP0h8/aba-riel.jpg">
        </div>
        <div id="qr-riel" class="qr-box" style="display:none;">
            <img src="https://i.postimg.cc/vZZrrQfY/riel-aba-asli.jpg">
        </div>

        <button id="submit-btn" onclick="sendToSpreadsheet()" class="final-btn">KONFIRMASI PESANAN ✅</button>
    </div>

    <audio id="bgMusic" loop><source src="lagu.mp3" type="audio/mpeg"></audio>

    <script>
        const snackData = [
            { id: 0, name: "KACANG TOJIN", img: "https://i.postimg.cc/MZbTnf6L/184f7bee-21ba-4477-81c6-c9f7acfb487a.jpg" },
            { id: 1, name: "KETAWA", img: "https://i.postimg.cc/ncFLBVMD/b95988fe-979d-48c6-891c-900e8f3e42f1.jpg" },
            { id: 2, name: "KACANG TING TING", img: "https://i.postimg.cc/hP2trF7k/ab4902a9-b072-4159-8ebb-3fbf45c8fc0b.jpg" },
            { id: 3, name: "MIE LIDI", img: "https://i.postimg.cc/K84vp9Pc/5bb5bc5e-cf70-47c1-86c5-dbd05e0cc616.jpg" },
            { id: 4, name: "MAKARONI", img: "https://i.postimg.cc/9f7XCrgJ/9c04e078-ee93-4550-8310-851e9a34d691.jpg" },
            { id: 5, name: "BASRENG", img: "https://i.postimg.cc/gjYGV4z5/601de701-a9b5-4bbf-8aa6-87b171349a64.jpg" },
            { id: 6, name: "LUMPIA", img: "https://i.postimg.cc/ZYcbbkj9/38611567-5f9f-4899-9d33-cffa77b5e469.jpg" },
            { id: 7, name: "KACANG ARAB", img: "https://i.postimg.cc/sDgV1n09/16ad7cba-62a3-48d4-a52c-25fe2f379b5e.jpg" },
            { id: 8, name: "KACANG MADU", img: "https://i.postimg.cc/sDH3Wpk1/129f1f36-b98b-4f99-bdde-93c543eb32e8.jpg" }
        ];

        let cart = {};
        function init() {
            const grid = document.getElementById('container-snack');
            snackData.forEach(s => {
                grid.innerHTML += `
                    <div class="card">
                        <img src="${s.img}">
                        <div class="card-info">
                            <div class="card-name">${s.name}</div>
                            <div class="counter">
                                <button class="btn-qty" onclick="changeQty(${s.id}, -1)">-</button>
                                <span class="qty-val" id="qty-${s.id}">0</span>
                                <button class="btn-qty" onclick="changeQty(${s.id}, 1)">+</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function changeQty(id, delta) {
            cart[id] = (cart[id] || 0) + delta;
            if(cart[id] < 0) cart[id] = 0;
            document.getElementById(`qty-${id}`).innerText = cart[id];
            updateTotal();
        }

        function updateTotal() {
            let total = 0; let list = [];
            Object.keys(cart).forEach(id => {
                if(cart[id] > 0) { total += cart[id] * 2.5; list.push(`${cart[id]}x ${snackData[id].name}`); }
            });
            const bar = document.getElementById('total-bar');
            if(total > 0) {
                bar.style.display = 'flex';
                document.getElementById('display-total').innerText = `$${total.toFixed(2)}`;
                document.getElementById('summary').innerText = list.join(", ");
            } else { bar.style.display = 'none'; }
        }

        function openPayment() {
            document.getElementById('bgMusic').play();
            const pay = document.getElementById('payment-area');
            pay.style.display = 'block';
            pay.scrollIntoView({ behavior: 'smooth' });
        }

        function showQR(type, btn) {
            document.getElementById('qr-usd').style.display = type === 'usd' ? 'block' : 'none';
            document.getElementById('qr-riel').style.display = type === 'riel' ? 'block' : 'none';
            document.querySelectorAll('.pay-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function sendToSpreadsheet() {
            const nama = document.getElementById('nama-pembeli').value;
            if(!nama) { alert("Nama jangan kosong ya!"); return; }
            let list = []; let totalUSD = 0;
            Object.keys(cart).forEach(id => {
                if(cart[id] > 0) { totalUSD += cart[id] * 2.5; list.push(`${cart[id]}x ${snackData[id].name}`); }
            });
            const btn = document.getElementById('submit-btn');
            btn.innerText = "MENGIRIM..."; btn.disabled = true;
            
            const scriptURL = "https://script.google.com/macros/s/AKfycby-koR4z1YFZYSs3XPAkrGMdpBcN7tqx_1i1JAf4W5vo9Ka-0w8NjYrMFXHIytVZ6FY/exec";
            const params = new URLSearchParams();
            params.append('pesanan', `Pembeli: ${nama} | Order: ${list.join(", ")}`);
            params.append('total', "$" + totalUSD.toFixed(2));

            fetch(`${scriptURL}?${params.toString()}`, { method: 'POST', mode: 'no-cors' })
            .then(() => { alert("PESANAN BERHASIL!"); location.reload(); })
            .catch(() => { alert("Terkirim ke Spreadsheet!"); location.reload(); });
        }
        init();
    </script>
</body>
</html>
