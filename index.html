<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERSNACKS.ID</title>
    <style>
        :root { --primary: #f7941d; --glass: rgba(18, 18, 18, 0.9); --success: #27ae60; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #000; color: white; text-align: center; padding-bottom: 50px; overflow-x: hidden; }
        .falling-snack { position: fixed; top: -50px; font-size: 28px; z-index: 100; user-select: none; pointer-events: none; animation: fall linear forwards; color: #fff; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
        header { padding: 45px 10px; background: var(--glass); border-bottom: 2px solid var(--primary); }
        .logo-header { width: 280px; filter: drop-shadow(0 0 15px var(--primary)); }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 15px; max-width: 800px; margin: 0 auto; }
        .card { background: var(--glass); border-radius: 15px; overflow: hidden; border: 1px solid rgba(247,148,29,0.2); position: relative; }
        .card img { width: 100%; height: 120px; object-fit: cover; }
        .sold-out-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 120px; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 5; }
        .is-empty .sold-out-overlay { display: flex; }
        .card-info { padding: 8px; }
        .card-name { font-size: 0.7em; font-weight: 800; color: var(--primary); height: 30px; text-transform: uppercase; }
        .stock-tag { font-size: 0.6em; background: rgba(247,148,29,0.2); padding: 2px 5px; border-radius: 4px; display: inline-block; margin-bottom: 5px; }
        .counter { display: flex; justify-content: center; align-items: center; gap: 5px; margin-top: 8px; }
        .btn-qty { background: none; border: 1px solid var(--primary); width: 25px; height: 25px; color: white; border-radius: 5px; cursor: pointer; }
        #total-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--glass); padding: 15px; display: none; justify-content: space-between; align-items: center; border-top: 2px solid var(--primary); z-index: 1000; backdrop-filter: blur(5px); }
        .btn-order { background: var(--primary); color: black; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 900; cursor: pointer; }
        #payment-area { display:none; padding: 30px 10px; background: #000; border-top: 2px solid var(--primary); }
        .input-nama { width: 80%; padding: 12px; border-radius: 8px; border: 1px solid var(--primary); background: none; color: white; margin-bottom: 15px; text-align: center; }
        .qr-box { display: none; margin: 15px 0; }
        .qr-box img { width: 200px; border: 3px solid white; border-radius: 10px; }
        .final-btn { background: var(--success); color: white; padding: 15px; border: none; border-radius: 30px; font-weight: 900; width: 80%; cursor: pointer; }
        @media (max-width: 600px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

<header>
    <img src="https://i.postimg.cc/T3Dj51gC/download.png" class="logo-header">
    <p style="color:var(--primary); font-weight:800;">PREMIUM QUALITY • $3.00</p>
</header>

<div id="loading" style="padding: 50px; color: var(--primary); font-weight: 800;">MENYIAPKAN SNACK...</div>
<div class="grid" id="container-snack"></div>

<div id="total-bar">
    <div style="text-align:left">
        <div id="summary" style="font-size: 0.6em; color: #ccc;"></div>
        <div id="display-total" style="font-weight: 900; color: var(--primary); font-size: 1.2em;">$0.00</div>
    </div>
    <button class="btn-order" onclick="openPayment()">ORDER</button>
</div>

<div id="payment-area">
    <input type="text" id="nama-pembeli" class="input-nama" placeholder="MASUKKAN NAMA ANDA">
    <div>
        <button onclick="showQR('usd')" style="padding:8px; color:white; background:none; border:1px solid var(--primary); border-radius: 5px; margin: 5px;">USD</button>
        <button onclick="showQR('riel')" style="padding:8px; color:white; background:none; border:1px solid var(--primary); border-radius: 5px; margin: 5px;">RIEL</button>
    </div>
    <div id="qr-usd" class="qr-box"><img src="https://i.postimg.cc/nrqkP0h8/aba-riel.jpg"></div>
    <div id="qr-riel" class="qr-box"><img src="https://i.postimg.cc/vZZrrQfY/riel-aba-asli.jpg"></div>
    <button id="submit-btn" onclick="sendToSpreadsheet()" class="final-btn" style="margin-top:15px;">KONFIRMASI PEMBAYARAN</button>
</div>

<script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbzVZSuOqLyYR12NbRGsxV-YiXzGopKEpz-iNyNqnJ5zOoMVDxYCZu46fAq7Hny3vwc/exec";

    function createSnack() {
        const icons = ['🥨', '🍪', '🍬', '🥜', '🍿'];
        const snack = document.createElement('div');
        snack.className = 'falling-snack';
        snack.innerText = icons[Math.floor(Math.random() * icons.length)];
        snack.style.left = Math.random() * 100 + 'vw';
        snack.style.animationDuration = Math.random() * 3 + 2 + 's';
        document.body.appendChild(snack);
        setTimeout(() => snack.remove(), 5000);
    }
    setInterval(createSnack, 300);

    let snackData = [
        { id: 0, name: "KACANG TOJIN", stock: 0, img: "https://i.postimg.cc/MZbTnf6L/184f7bee-21ba-4477-81c6-c9f7acfb487a.jpg" },
        { id: 1, name: "KETAWA", stock: 0, img: "https://i.postimg.cc/ncFLBVMD/b95988fe-979d-48c6-891c-900e8f3e42f1.jpg" },
        { id: 2, name: "KACANG TING TING", stock: 0, img: "https://i.postimg.cc/hP2trF7k/ab4902a9-b072-4159-8ebb-3fbf45c8fc0b.jpg" },
        { id: 3, name: "MIE LIDI", stock: 0, img: "https://i.postimg.cc/WbJ7sj5j/image.png" },
        { id: 4, name: "MAKARONI", stock: 0, img: "https://i.postimg.cc/9f7XCrgJ/9c04e078-ee93-4550-8310-851e9a34d691.jpg" },
        { id: 5, name: "BASRENG", stock: 0, img: "https://i.postimg.cc/gjYGV4z5/601de701-a9b5-4bbf-8aa6-87b171349a64.jpg" },
        { id: 6, name: "LUMPIA", stock: 0, img: "https://i.postimg.cc/ZYcbbkj9/38611567-5f9f-4899-9d33-cffa77b5e469.jpg" },
        { id: 7, name: "KACANG ARAB", stock: 0, img: "https://i.postimg.cc/sDgV1n09/16ad7cba-62a3-48d4-a52c-25fe2f379b5e.jpg" },
        { id: 8, name: "KACANG MADU", stock: 0, img: "https://i.postimg.cc/sDH3Wpk1/129f1f36-b98b-4f99-bdde-93c543eb32e8.jpg" }
    ];

    let cart = {};

    async function init() {
        try {
            const res = await fetch(scriptURL);
            const sheetStok = await res.json();
            snackData.forEach(s => { if(sheetStok[s.name] !== undefined) s.stock = sheetStok[s.name]; });
            document.getElementById('loading').style.display = 'none';
            render();
        } catch(e) { 
            console.error(e);
            setTimeout(init, 3000); 
        }
    }

    function render() {
        const grid = document.getElementById('container-snack');
        grid.innerHTML = '';
        snackData.forEach(s => {
            const empty = s.stock <= 0;
            grid.innerHTML += `<div class="card ${empty ? 'is-empty' : ''}">
                <div class="sold-out-overlay"><div style="background:red;padding:5px;font-weight:900;transform:rotate(-15deg);border:2px solid white;">SOLD OUT</div></div>
                <img src="${s.img}">
                <div class="card-info">
                    <div class="card-name">${s.name}</div>
                    <div class="stock-tag">SISA: ${s.stock}</div>
                    <div class="counter">
                        <button class="btn-qty" onclick="changeQty(${s.id},-1)" ${empty?'disabled':''}>-</button>
                        <span id="qty-${s.id}" style="font-weight:900;min-width:15px;">0</span>
                        <button class="btn-qty" onclick="changeQty(${s.id},1)" ${empty?'disabled':''}>+</button>
                    </div>
                </div>
            </div>`;
        });
    }

    function changeQty(id, delta) {
        let q = cart[id] || 0;
        if(delta > 0 && q >= snackData[id].stock) return;
        q += delta; if(q < 0) q = 0;
        cart[id] = q;
        document.getElementById(`qty-${id}`).innerText = q;
        updateTotal();
    }

    function updateTotal() {
        let total = 0; let list = [];
        Object.keys(cart).forEach(id => { 
            if(cart[id]>0){ 
                total += cart[id]*3; 
                list.push(`${cart[id]}x ${snackData[id].name}`); 
            }
        });
        document.getElementById('total-bar').style.display = total > 0 ? 'flex' : 'none';
        document.getElementById('display-total').innerText = `$${total.toFixed(2)}`;
        document.getElementById('summary').innerText = list.join(", ");
    }

    function openPayment() { 
        document.getElementById('payment-area').style.display='block'; 
        window.scrollTo({top: document.body.scrollHeight, behavior: 'smooth'}); 
    }

    function showQR(t) { 
        document.getElementById('qr-usd').style.display = t=='usd'?'block':'none'; 
        document.getElementById('qr-riel').style.display = t=='riel'?'block':'none'; 
    }

    function sendToSpreadsheet() {
        const nama = document.getElementById('nama-pembeli').value;
        if(!nama) return alert("Siapa Nama Anda?");
        
        let list = []; let total = 0;
        Object.keys(cart).forEach(id => { 
            if(cart[id]>0){ 
                total += cart[id]*3; 
                list.push(`${cart[id]}x ${snackData[id].name}`); 
            }
        });

        const btn = document.getElementById('submit-btn');
        btn.innerText = "MENGIRIM..."; btn.disabled = true;

        const params = new URLSearchParams();
        params.append('pesanan', `Pembeli: ${nama} | Order: ${list.join(", ")}`);
        params.append('total', "$" + total.toFixed(2));

        fetch(`${scriptURL}?${params.toString()}`, { method: 'POST', mode: 'no-cors' })
        .then(() => { 
            alert("PESANAN BERHASIL TERKIRIM!"); 
            location.reload(); 
        })
        .catch(() => {
            alert("Terjadi kesalahan, tapi coba cek spreadsheet lo!");
            location.reload();
        });
    }
    init();
</script>
</body>
</html>
