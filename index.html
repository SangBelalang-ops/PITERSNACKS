<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERSNACKS - Premium Checkout</title>
    <style>
        :root { --primary: #f7941d; --dark: #1a1a1a; --aba: #005a8d; --success: #27ae60; }
        body { 
            font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; background-color: #f9f9f9; text-align: center; padding-bottom: 150px;
            background-image: url('https://i.postimg.cc/bvQNX9PS/d86aa452-3ea3-4a45-8dd4-5fd3ba61f3b1.jpg');
            background-attachment: fixed; background-position: center; background-repeat: no-repeat; background-size: 70% auto;
        }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.8); z-index: -1; }

        header { 
            padding: 15px 20px; background: white; border-bottom: 2px solid var(--primary); 
            display: flex; align-items: center; gap: 15px; position: sticky; top: 0; z-index: 1000;
        }
        .logo-header { width: 45px; height: 45px; border-radius: 8px; object-fit: cover; }

        /* INPUT NAMA DI ATAS BIAR GAK HILANG */
        .section-nama { 
            background: rgba(255, 255, 255, 0.9); padding: 20px; margin: 15px; 
            border-radius: 15px; border: 2px dashed var(--primary); 
        }
        .input-nama { 
            width: 90%; padding: 15px; border-radius: 10px; border: 2px solid var(--primary); 
            font-size: 1.1em; text-align: center; font-weight: 900; text-transform: uppercase;
        }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 15px; max-width: 800px; margin: 0 auto; }
        .card { background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(5px); border-radius: 12px; overflow: hidden; border: 1px solid #ddd; }
        .card img { width: 100%; height: 120px; object-fit: cover; }
        .card-name { font-size: 0.7em; font-weight: 900; padding: 10px 5px; text-transform: uppercase; height: 30px; display: flex; align-items: center; justify-content: center; }

        .counter { display: flex; justify-content: center; align-items: center; gap: 10px; padding-bottom: 15px; }
        .btn-qty { background: white; border: 1px solid #ccc; width: 30px; height: 30px; border-radius: 5px; font-weight: bold; cursor: pointer; }

        #total-bar { 
            position: fixed; bottom: 0; left: 0; right: 0; background: var(--dark); color: white; 
            padding: 20px; display: none; justify-content: space-between; align-items: center; z-index: 2000;
        }
        .btn-order { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; }

        #payment-area { display:none; padding: 30px 20px; background: white; border-top: 5px solid var(--primary); position: relative; z-index: 2001; }
        .pay-btn { padding: 12px; border: 2px solid var(--aba); border-radius: 8px; background: white; font-weight: bold; cursor: pointer; margin: 5px; }
        .pay-btn.active { background: var(--aba); color: white; }
        .qr-box img { width: 250px; border-radius: 15px; margin-top: 15px; border: 5px solid #eee; }

        .final-btn { background: var(--success); color: white; padding: 20px; border: none; border-radius: 15px; font-weight: 900; width: 100%; cursor: pointer; margin-top: 20px; font-size: 1.1em; }
        .macaroni { position: fixed; top: -50px; font-size: 20px; z-index: 9999; pointer-events: none; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(105vh) rotate(360deg); } }
    </style>
</head>
<body>

    <header>
        <img src="https://i.postimg.cc/bvQNX9PS/d86aa452-3ea3-4a45-8dd4-5fd3ba61f3b1.jpg" class="logo-header">
        <div style="text-align:left;">
            <h2 style="margin:0; font-size: 1.1em;">TERSNACKS</h2>
            <p style="margin:0; font-size:0.6em; color:var(--primary); font-weight:bold;">PREMIUM QUALITY SNACKS</p>
        </div>
    </header>

    <div class="section-nama">
        <p style="margin:0 0 10px 0; font-weight:bold; font-size:0.8em;">STEP 1: MASUKKAN NAMA ANDA</p>
        <input type="text" id="nama-pembeli" class="input-nama" placeholder="NAMA PEMBELI...">
    </div>

    <p style="font-weight:bold; font-size:0.8em; margin-top:20px;">STEP 2: PILIH SNACK</p>
    <div class="grid" id="container-snack"></div>

    <div id="total-bar">
        <div style="text-align:left;">
            <div id="summary" style="font-size: 0.6em; opacity: 0.8;">Pilih snack...</div>
            <div style="font-weight:900; color:var(--primary); font-size:1.2em;" id="display-total">$0.00</div>
        </div>
        <button class="btn-order" onclick="openPayment()">LANJUT BAYAR</button>
    </div>

    <div id="payment-area">
        <h2 style="margin:0;">PEMBAYARAN</h2>
        <p style="font-size:0.8em; opacity:0.7;">Pilih metode transfer ABA di bawah:</p>
        
        <div style="margin:15px 0;">
            <button class="pay-btn" onclick="showQR('usd', this)">BAYAR USD ($)</button>
            <button class="pay-btn" onclick="showQR('riel', this)">BAYAR RIEL (៛)</button>
        </div>

        <div id="qr-usd" class="qr-box" style="display:none;"><img src="https://i.postimg.cc/nrqkP0h8/aba-riel.jpg"></div>
        <div id="qr-riel" class="qr-box" style="display:none;"><img src="https://i.postimg.cc/vZZrrQfY/riel-aba-asli.jpg"></div>

        <button id="submit-btn" onclick="sendToSpreadsheet()" class="final-btn">SAYA SUDAH TRANSFER</button>
    </div>

    <audio id="bgMusic" loop><source src="lagu.mp3" type="audio/mpeg"></audio>

    <script>
        const snackData = [
            { id: 0, name: "KACANG TOJIN", img: "https://i.postimg.cc/MZbTnf6L/184f7bee-21ba-4477-81c6-c9f7acfb487a.jpg" },
            { id: 1, name: "KETAWA", img: "https://i.postimg.cc/ncFLBVMD/b95988fe-979d-48c6-891c-900e8f3e42f1.jpg" },
            { id: 2, name: "KACANG TING TING", img: "https://i.postimg.cc/hP2trF7k/ab4902a9-b072-4159-8ebb-3fbf45c8fc0b.jpg" },
            { id: 3, name: "MIE LIDI", img: "https://i.postimg.cc/K84vp9Pc/5bb5bc5e-cf70-47c1-86c5-dbd05e0cc616.jpg" },
            { id: 4, name: "MAKARONI", img: "https://i.postimg.cc/9f7XCrgJ/9c04e078-ee93-4550-8310-851e9a34d691.jpg" },
            { id: 5, name: "BASRENG", img: "https://i.postimg.cc/gjYGV4z5/601de701-a9b5-4bbf-8aa6-87b171349a64.jpg" },
            { id: 6, name: "LUMPIA", img: "https://i.postimg.cc/ZYcbbkj9/38611567-5f9f-4899-9d33-cffa77b5e469.jpg" },
            { id: 7, name: "KACANG ARAB", img: "https://i.postimg.cc/sDgV1n09/16ad7cba-62a3-48d4-a52c-25fe2f379b5e.jpg" },
            { id: 8, name: "KACANG MADU", img: "https://i.postimg.cc/sDH3Wpk1/129f1f36-b98b-4f99-bdde-93c543eb32e8.jpg" }
        ];

        let cart = {};

        function init() {
            const grid = document.getElementById('container-snack');
            snackData.forEach(s => {
                grid.innerHTML += `
                    <div class="card">
                        <img src="${s.img}">
                        <div class="card-name">${s.name}</div>
                        <div class="counter">
                            <button class="btn-qty" onclick="changeQty(${s.id}, -1)">-</button>
                            <span id="qty-${s.id}" style="font-weight:900;">0</span>
                            <button class="btn-qty" onclick="changeQty(${s.id}, 1)">+</button>
                        </div>
                    </div>
                `;
            });
        }

        function changeQty(id, delta) {
            cart[id] = (cart[id] || 0) + delta;
            if(cart[id] < 0) cart[id] = 0;
            document.getElementById(`qty-${id}`).innerText = cart[id];
            updateTotal();
        }

        function updateTotal() {
            let total = 0; let list = [];
            Object.keys(cart).forEach(id => {
                if(cart[id] > 0) {
                    total += cart[id] * 2.5;
                    list.push(`${cart[id]}x ${snackData[id].name}`);
                }
            });
            document.getElementById('total-bar').style.display = total > 0 ? 'flex' : 'none';
            document.getElementById('display-total').innerText = `$${total.toFixed(2)}`;
            document.getElementById('summary').innerText = list.join(", ");
        }

        function openPayment() {
            document.getElementById('bgMusic').play();
            document.getElementById('payment-area').style.display = 'block';
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function showQR(type, btn) {
            document.getElementById('qr-usd').style.display = type === 'usd' ? 'block' : 'none';
            document.getElementById('qr-riel').style.display = type === 'riel' ? 'block' : 'none';
            document.querySelectorAll('.pay-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function sendToSpreadsheet() {
            const nama = document.getElementById('nama-pembeli').value.trim();
            if(!nama) { alert("ISI NAMA DULU DI PALING ATAS, BOS!"); window.scrollTo({top:0, behavior:'smooth'}); return; }

            let list = []; let totalUSD = 0;
            Object.keys(cart).forEach(id => {
                if(cart[id] > 0) {
                    totalUSD += cart[id] * 2.5;
                    list.push(`${cart[id]}x ${snackData[id].name}`);
                }
            });

            const btn = document.getElementById('submit-btn');
            btn.innerText = "MENGIRIM..."; btn.disabled = true;

            const scriptURL = "https://script.google.com/macros/s/AKfycby-koR4z1YFZYSs3XPAkrGMdpBcN7tqx_1i1JAf4W5vo9Ka-0w8NjYrMFXHIytVZ6FY/exec";
            const params = new URLSearchParams();
            params.append('pembeli', nama.toUpperCase());
            params.append('pesanan', list.join(", "));
            params.append('total', "$" + totalUSD.toFixed(2));

            fetch(`${scriptURL}?${params.toString()}`, { method: 'POST', mode: 'no-cors' })
            .then(() => { alert("PESANAN BERHASIL!"); location.reload(); });
        }
        setInterval(() => {
            const m = document.createElement('div'); m.className = 'macaroni'; m.innerText = '🍤';
            m.style.left = Math.random() * 100 + 'vw'; m.style.animationDuration = Math.random() * 2 + 3 + 's';
            document.body.appendChild(m); setTimeout(() => m.remove(), 5000);
        }, 600);
        init();
    </script>
</body>
</html>
