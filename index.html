<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERSNACKS.ID - PREMIUM QUALITY</title>
    <style>
        :root { --primary: #00d4ff; --glass: rgba(10, 25, 41, 0.9); --success: #00f2ff; --danger: #ff4d4d; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #000; color: white; text-align: center; padding-bottom: 50px; overflow-x: hidden; }
        .falling-snack { position: fixed; top: -50px; font-size: 28px; z-index: 100; user-select: none; pointer-events: none; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
        header { padding: 45px 10px; background: var(--glass); border-bottom: 2px solid var(--primary); }
        .logo-header { width: 280px; filter: drop-shadow(0 0 15px var(--primary)); }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 15px; max-width: 1000px; margin: 0 auto; }
        .card { background: var(--glass); border-radius: 15px; overflow: hidden; border: 1px solid rgba(0, 212, 255, 0.2); position: relative; }
        .card img { width: 100%; height: 130px; object-fit: cover; }
        .sold-out-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 130px; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; }
        .is-empty .sold-out-overlay { display: flex; }
        .card-info { padding: 10px; }
        .card-name { font-size: 0.75em; font-weight: 800; color: var(--primary); height: 35px; text-transform: uppercase; }
        .stock-tag { font-size: 0.65em; color: var(--primary); background: rgba(0, 212, 255, 0.1); border-radius: 5px; padding: 2px 8px; margin-bottom: 10px; display: inline-block; }
        .counter { display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-qty { background: rgba(255,255,255,0.1); border: 1px solid var(--primary); width: 30px; height: 30px; border-radius: 8px; color: white; cursor: pointer; }
        #total-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--glass); padding: 18px 25px; display: none; justify-content: space-between; align-items: center; border-top: 2px solid var(--primary); z-index: 1000; backdrop-filter: blur(10px); }
        #payment-area { display:none; padding: 40px 20px; background: rgba(0,0,0,0.95); border-top: 2px solid var(--primary); }
        .input-nama { width: 85%; padding: 15px; border-radius: 12px; border: 1px solid var(--primary); background: transparent; color: white; margin-bottom: 20px; text-align: center; font-weight: 800; }
        .final-btn { background: var(--success); color: #000; padding: 18px; border: none; border-radius: 50px; font-weight: 900; width: 90%; cursor: pointer; }
        @media (max-width: 600px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

<header>
    <img src="https://i.postimg.cc/T3Dj51gC/download.png" class="logo-header">
    <p>PREMIUM QUALITY • $3.00</p>
</header>

<div id="loading" style="padding: 50px; color: var(--primary);">SYNCING STOCK...</div>
<div class="grid" id="container-snack"></div>

<div id="total-bar">
    <div style="text-align:left">
        <div id="summary" style="font-size: 0.65em; color: #ccc;"></div>
        <div id="display-total" style="font-weight: 900; color: var(--primary); font-size: 1.4em;">$0.00</div>
    </div>
    <button onclick="openPayment()" style="background:var(--primary); border:none; padding:12px 20px; border-radius:10px; font-weight:900;">ORDER</button>
</div>

<div id="payment-area">
    <input type="text" id="nama-pembeli" class="input-nama" placeholder="NAMA ANDA">
    <div id="qr-usd" style="margin-bottom:20px;"><img src="https://i.postimg.cc/nrqkP0h8/aba-riel.jpg" width="200"></div>
    <button id="submit-btn" onclick="sendToSpreadsheet()" class="final-btn">KONFIRMASI & KIRIM</button>
</div>

<script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbymsawZK3cr8cD8kyfxQQoML_GBjUO0EEBWvOnAAtiRsGQH4OL6rRElSwW7Al1bHMy6/exec";

    let snackData = [
        { id: 0, name: "KACANG TOJIN", stock: 0, img: "https://i.postimg.cc/MZbTnf6L/184f7bee-21ba-4477-81c6-c9f7acfb487a.jpg" },
        { id: 1, name: "KETAWA", stock: 0, img: "https://i.postimg.cc/ncFLBVMD/b95988fe-979d-48c6-891c-900e8f3e42f1.jpg" },
        { id: 2, name: "KACANG TING TING", stock: 0, img: "https://i.postimg.cc/hP2trF7k/ab4902a9-b072-4159-8ebb-3fbf45c8fc0b.jpg" },
        { id: 3, name: "MIE LIDI", stock: 0, img: "https://i.postimg.cc/WbJ7sj5j/image.png" },
        { id: 4, name: "MAKARONI", stock: 0, img: "https://i.postimg.cc/9f7XCrgJ/9c04e078-ee93-4550-8310-851e9a34d691.jpg" },
        { id: 5, name: "BASRENG", stock: 0, img: "https://i.postimg.cc/gjYGV4z5/601de701-a9b5-4bbf-8aa6-87b171349a64.jpg" },
        { id: 6, name: "LUMPIA", stock: 0, img: "https://i.postimg.cc/ZYcbbkj9/38611567-5f9f-4899-9d33-cffa77b5e469.jpg" },
        { id: 7, name: "KACANG ARAB", stock: 0, img: "https://i.postimg.cc/sDgV1n09/16ad7cba-62a3-48d4-a52c-25fe2f379b5e.jpg" },
        { id: 8, name: "KACANG MADU", stock: 0, img: "https://i.postimg.cc/sDH3Wpk1/129f1f36-b98b-4f99-bdde-93c543eb32e8.jpg" }
    ];

    let cart = {};

    function init() {
        const s = document.createElement('script');
        s.src = `${scriptURL}?callback=handleData`;
        document.body.appendChild(s);
    }

    function handleData(d) {
        snackData.forEach(s => { if(d[s.name] !== undefined) s.stock = parseInt(d[s.name]); });
        document.getElementById('loading').style.display = 'none';
        render();
    }

    function render() {
        const g = document.getElementById('container-snack'); g.innerHTML = '';
        snackData.forEach(s => {
            const e = s.stock <= 0;
            g.innerHTML += `<div class="card ${e?'is-empty':''}">
                <div class="sold-out-overlay"><b style="background:red;padding:5px;font-size:0.6em">SOLD OUT</b></div>
                <img src="${s.img}"><div class="card-info"><div class="card-name">${s.name}</div>
                <div class="stock-tag">SISA: ${s.stock}</div>
                <div class="counter">
                <button class="btn-qty" onclick="changeQty(${s.id},-1)">-</button>
                <span id="qty-${s.id}" style="margin:0 10px">0</span>
                <button class="btn-qty" onclick="changeQty(${s.id},1)">+</button>
                </div></div></div>`;
        });
    }

    function changeQty(id, delta) {
        let q = (cart[id] || 0) + delta;
        if(q < 0 || (delta > 0 && q > snackData[id].stock)) return;
        cart[id] = q; document.getElementById(`qty-${id}`).innerText = q; updateTotal();
    }

    function updateTotal() {
        let t = 0; let l = [];
        Object.keys(cart).forEach(id => { if(cart[id]>0){ t += cart[id]*3; l.push(`${cart[id]}x ${snackData[id].name}`); }});
        document.getElementById('total-bar').style.display = t > 0 ? 'flex' : 'none';
        document.getElementById('display-total').innerText = `$${t.toFixed(2)}`;
        document.getElementById('summary').innerText = l.join(", ");
    }

    function openPayment() { document.getElementById('payment-area').style.display='block'; }

    function sendToSpreadsheet() {
        const n = document.getElementById('nama-pembeli').value;
        if(!n) return alert("NAMA!");
        let l = []; let t = 0;
        Object.keys(cart).forEach(id => { if(cart[id]>0){ t+=cart[id]*3; l.push(`${cart[id]}x ${snackData[id].name}`); }});
        const btn = document.getElementById('submit-btn'); btn.innerText = "SENDING..."; btn.disabled = true;

        // KIRIM SEBAGAI 3 PARAMETER AGAR DI SCRIPT BISA DIOLAH JADI 4 KOLOM
        fetch(`${scriptURL}?nama=${encodeURIComponent(n)}&pesanan=${encodeURIComponent(l.join(", "))}&total=${encodeURIComponent("$"+t.toFixed(2))}`, { method: 'GET', mode: 'no-cors' })
        .then(() => { alert("BERHASIL!"); location.reload(); });
    }
    init();
</script>
</body>
</html>
